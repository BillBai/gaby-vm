schema: spec-driven

# Project context — shown to AI when creating artifacts
context: |
  Gaby-VM is an embeddable AArch64 (EL0 / user-mode) instruction interpreter
  built on imported VIXL simulator semantics. It ships as the CMake static
  library `gaby_vm::gaby_vm`, designed to embed into a host process whose
  address space the simulator shares directly.

  Tech stack: C++17, CMake ≥ 3.21, CTest, `.clang-format` (Google base).

  ## Where to find everything

  This context deliberately stays thin. Look elsewhere for substantive content:

  - Mission, scope, and agent rules → [`../AGENTS.md`](../AGENTS.md)
  - Architecture, memory model, threading model, VIXL import boundary → [`../docs/architecture.md`](../docs/architecture.md)
  - Internal build structure → [`../docs/build.md`](../docs/build.md)
  - Coding conventions → [`../docs/conventions.md`](../docs/conventions.md)
  - Testing strategy → [`../docs/testing.md`](../docs/testing.md)
  - VIXL import tier list → [`../docs/refs/vixl-extraction-map.md`](../docs/refs/vixl-extraction-map.md)
  - Live capability specs (normative requirements) → [`specs/`](specs/)
  - User-facing build and embedding instructions → [`../README.md`](../README.md)

  ## OpenSpec notes specific to this repo

  - The repo uses OpenSpec for change proposals. Capabilities live under
    `specs/<capability>/spec.md`. In-flight changes live under `changes/`;
    archived changes under `changes/archive/`.
  - The default capability for changes touching the imported simulator boundary
    is `aarch64-simulator`. Cross-cutting work (a future predecode/dispatch
    cache, the embedding API, platform-portability layers) should introduce its
    own capability rather than expanding `aarch64-simulator`.
  - When authoring a change, **link to docs rather than restating them**. The
    docs above are the source of truth for conventions; duplicating into a
    change proposal tends to create drift.
  - OpenSpec artifacts are English-only. Do not create bilingual OpenSpec
    documents or `.zh-cn.md` variants under `openspec/`.
  - Two constraints to keep in mind, both drawn from the docs:
    - Imports stay within the tiers listed in the extraction map. If a change
      needs something outside the current tiers, update
      `docs/refs/vixl-extraction-map.md` alongside the import.
    - Edits to imported files use the `// gaby-vm` marker convention so that a
      single `git grep gaby-vm src/` continues to enumerate drift from
      upstream.
  - Design context to inherit: gaby-vm is used as **one `Simulator` instance
    per host thread, lazily initialised**. State that a change introduces is
    easiest to reason about when it's per-instance, or read-only / atomically
    updated if shared. Cross-thread mutable global state doesn't fit this
    model.

# Per-artifact rules
rules:
  # NOTE: OpenSpec applies rules by exact artifact ID (no `_all`/wildcard),
  # so the three cross-cutting rules below are repeated under each artifact.
  # Keep the repeated copies in sync when editing.
  proposal:
    - Write OpenSpec artifacts in English only. Do not add bilingual content or
      `.zh-cn.md` variants under `openspec/`.
    - Be concise. Prefer short, direct sentences over long explanations.
      If a section doesn't add information beyond what linked docs already say,
      leave it out. Every sentence should earn its place.
    - Link to docs instead of restating their content. Duplicating creates drift.
    - >-
      Before writing any artifact, consider whether superpowers skills apply:
      brainstorming (explore before committing to a design), TDD (tests before
      code), verification-before-completion (evidence before claims). Use them
      when relevant — don't skip just because OpenSpec has its own workflow.
    - Keep proposals under 80 lines. Say why, say what changes, say which
      capabilities are affected. That's it. Don't expand into implementation
      detail or full test plans — those belong in design and tasks.
    - Always include a brief "Non-goals" or "Out of scope" section.
  design:
    - Write OpenSpec artifacts in English only. Do not add bilingual content or
      `.zh-cn.md` variants under `openspec/`.
    - Be concise. Prefer short, direct sentences over long explanations.
      If a section doesn't add information beyond what linked docs already say,
      leave it out. Every sentence should earn its place.
    - Link to docs instead of restating their content. Duplicating creates drift.
    - >-
      Before writing any artifact, consider whether superpowers skills apply:
      brainstorming (explore before committing to a design), TDD (tests before
      code), verification-before-completion (evidence before claims). Use them
      when relevant — don't skip just because OpenSpec has its own workflow.
    - Keep designs under 200 lines. Focus on the key decisions and their
      trade-offs, not a blow-by-blow walkthrough of every file. When the
      implementation path is straightforward, a short design is fine — don't
      pad for symmetry with larger changes.
    - Show code snippets for non-obvious parts only. Don't paste large blocks
      of existing code or trivial getter/setter-level changes.
  specs:
    - Write OpenSpec artifacts in English only. Do not add bilingual content or
      `.zh-cn.md` variants under `openspec/`.
    - Be concise. Prefer short, direct sentences over long explanations.
      If a section doesn't add information beyond what linked docs already say,
      leave it out. Every sentence should earn its place.
    - Link to docs instead of restating their content. Duplicating creates drift.
    - >-
      Before writing any artifact, consider whether superpowers skills apply:
      brainstorming (explore before committing to a design), TDD (tests before
      code), verification-before-completion (evidence before claims). Use them
      when relevant — don't skip just because OpenSpec has its own workflow.
  tasks:
    - Write OpenSpec artifacts in English only. Do not add bilingual content or
      `.zh-cn.md` variants under `openspec/`.
    - Be concise. Prefer short, direct sentences over long explanations.
      If a section doesn't add information beyond what linked docs already say,
      leave it out. Every sentence should earn its place.
    - Link to docs instead of restating their content. Duplicating creates drift.
    - >-
      Before writing any artifact, consider whether superpowers skills apply:
      brainstorming (explore before committing to a design), TDD (tests before
      code), verification-before-completion (evidence before claims). Use them
      when relevant — don't skip just because OpenSpec has its own workflow.
    - >-
      Break tasks into concrete, verifiable steps. Each task should produce
      something you can check: a test that passes, a build that succeeds, a
      file that exists.
    - >-
      Follow TDD order: write failing test → implement → verify pass. Don't
      list implementation before its test.
    - Use superpowers:verification-before-completion. Before marking a task
      done, re-run the relevant verification command and confirm the output.
