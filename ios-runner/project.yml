# XcodeGen spec for the gaby-vm iOS runner (host app + XCTest bundle).
# The gaby_vm library is built by the CMake-generated project referenced below
# as `GabyVMLib`; this spec only owns the host shell that runs gaby-vm's
# correctness suites and benchmark harness on iOS. The test target depends on
# the library's `gaby_vm` target, so Xcode builds it for the active destination
# (sim arm64 / device arm64) and links its product directly. Regenerate with
# ios-runner/generate.sh (runs cmake -G Xcode, strips legacy PBXBuildStyle,
# then xcodegen).
name: GabyRunner
options:
  bundleIdPrefix: dev.gabyvm
  deploymentTarget:
    iOS: "13.0"
  createIntermediateGroups: true

# The CMake-generated gaby_vm library project. generate.sh produces and
# sanitizes it under build/ios-xcode/ before invoking xcodegen.
projectReferences:
  GabyVMLib:
    path: ../build/ios-xcode/gaby_vm.xcodeproj

# Optional local, untracked signing config (DEVELOPMENT_TEAM) for on-device
# runs. generate.sh writes a placeholder if it is absent; it is git-ignored, so
# no team is ever committed. Leave it empty for Simulator-only use.
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

settings:
  base:
    CLANG_CXX_LANGUAGE_STANDARD: "c++20"
    # Simulator builds need no signing (no team — CI and quick local runs).
    # Device builds DO sign: Automatic signing + DEVELOPMENT_TEAM (set in
    # Signing.xcconfig, or pick a team in Xcode). No team/identity is committed.
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"

targets:
  # Minimal host application — exists so the XCTest bundle has a process to load
  # into on the simulator and on device.
  GabyRunner:
    type: application
    platform: iOS
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.gabyvm.runner
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"

  GabyRunnerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.gabyvm.runnerTests
        CODE_SIGN_STYLE: Automatic
        # Required to code-sign the test bundle on a device (the Simulator path
        # doesn't sign, so it only surfaces here).
        GENERATE_INFOPLIST_FILE: "YES"
        # Public gaby_vm headers (#include "gaby_vm/..."). The private VIXL
        # headers stay inside the library target, not here.
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../Sources/gaby_vm/include"
          # vixl_port_entries.h — the thin, dependency-free suite entry points.
          - "$(SRCROOT)/../test/test_support/vixl_asm/harness"
          # ios_runner_entries.h — the baseline/unit suite entry points.
          - "$(SRCROOT)/../test"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GabyRunner.app/GabyRunner"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: GabyRunner
      # Cross-project dependencies on the CMake library targets (built under
      # GABY_VM_BUILD_IOS_RUNNER). Ordered dependent-first: the aggregate entry
      # references the family libs, which need the assembler island and the
      # gaby_vm leaf symbols.
      - target: GabyVMLib/gaby_vm_vixl_port_all_lib
      - target: GabyVMLib/gaby_vm_vixl_port_integer_lib
      - target: GabyVMLib/gaby_vm_vixl_port_fp_lib
      - target: GabyVMLib/gaby_vm_vixl_port_neon_lib
      - target: GabyVMLib/gaby_vm_vixl_asm_testonly
      # Baseline / unit suite libraries (each renames main() to its entry).
      - target: GabyVMLib/gaby_vm_ios_run_smoke_lib
      - target: GabyVMLib/gaby_vm_ios_run_simulator_smoke_lib
      - target: GabyVMLib/gaby_vm_ios_run_instructions_constexpr_smoke_lib
      - target: GabyVMLib/gaby_vm_ios_run_simulator_correctness_lib
      - target: GabyVMLib/gaby_vm_ios_run_reentrancy_lib
      - target: GabyVMLib/gaby_vm_ios_run_shadow_runner_lib
      - target: GabyVMLib/gaby_vm_ios_run_workload_shadow_lib
      - target: GabyVMLib/gaby_vm_ios_run_typed_register_io_lib
      - target: GabyVMLib/gaby_vm_ios_run_branch_hook_dispatch_lib
      - target: GabyVMLib/gaby_vm_ios_run_branch_hook_reentrancy_lib
      # Report-only business benchmark (cache/decoder), run by BenchTests.
      - target: GabyVMLib/gaby_vm_ios_business_bench_lib
      - target: GabyVMLib/gaby_vm

schemes:
  GabyRunner:
    build:
      targets:
        GabyRunner: all
        GabyRunnerTests: [test]
    test:
      targets:
        - GabyRunnerTests
